<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysing — MarketMind AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a1628;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Background particles ───────────────────── */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.08);
            animation: float linear infinite;
        }

        @keyframes float {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ── Card ───────────────────────────────────── */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 560px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 60px rgba(0,229,255,0.05);
        }

        /* ── Animated brain / logo ──────────────────── */
        .logo-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(0,229,255,0.15);
            border-top-color: #00e5ff;
            animation: spin 1.2s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            position: relative;
        }
        .logo-ring::after {
            content: '';
            position: absolute;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 3px solid rgba(0,229,255,0.08);
            border-bottom-color: rgba(0,229,255,0.5);
            animation: spin 2s linear infinite reverse;
        }
        .logo-ring i {
            font-size: 32px;
            color: #00e5ff;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin  { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

        /* ── Heading ─────────────────────────────────── */
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .idea-label {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 36px;
        }
        .idea-label span {
            color: #00e5ff;
            font-weight: 600;
        }

        /* ── Progress bar ───────────────────────────── */
        .progress-track {
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #00e5ff, #00b8cc);
            width: 5%;
            transition: width 0.6s ease;
            box-shadow: 0 0 12px rgba(0,229,255,0.6);
        }

        /* ── Steps list ─────────────────────────────── */
        .steps {
            list-style: none;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            transition: color 0.4s;
        }
        .step.active  { color: #fff; }
        .step.done    { color: rgba(255,255,255,0.6); }

        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            transition: all 0.4s;
            color: rgba(255,255,255,0.25);
        }
        .step.active .step-icon {
            border-color: #00e5ff;
            color: #00e5ff;
            box-shadow: 0 0 12px rgba(0,229,255,0.3);
            animation: pulse 1.2s ease-in-out infinite;
        }
        .step.done .step-icon {
            background: rgba(0,200,100,0.15);
            border-color: #00c864;
            color: #00c864;
            animation: none;
        }

        /* ── Status text ─────────────────────────────── */
        .status-text {
            margin-top: 32px;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.5px;
        }

        /* ── Error state ─────────────────────────────── */
        .error-box {
            display: none;
            background: rgba(255,50,50,0.1);
            border: 1px solid rgba(255,50,50,0.3);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 24px;
            font-size: 14px;
            color: #ff8888;
        }
        .retry-btn {
            display: none;
            margin-top: 16px;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.3);
            color: #00e5ff;
            padding: 10px 28px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: rgba(0,229,255,0.2); }
    </style>
</head>
<body>

    <!-- Particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Loading Card -->
    <div class="card">

        <div class="logo-ring">
            <i class="fas fa-brain"></i>
        </div>

        <h1>Analysing Your Idea</h1>
        <p class="idea-label">
            "<span>{{ idea }}</span>"
        </p>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <ul class="steps" id="stepsList">
            <li class="step" id="step-ai">
                <div class="step-icon"><i class="fas fa-robot"></i></div>
                <span>Running Gemini AI analysis</span>
            </li>
            <li class="step" id="step-market">
                <div class="step-icon"><i class="fas fa-chart-line"></i></div>
                <span>Fetching Google Trends data</span>
            </li>
            <li class="step" id="step-competitors">
                <div class="step-icon"><i class="fas fa-crosshairs"></i></div>
                <span>Scanning competitor landscape</span>
            </li>
            <li class="step" id="step-ecommerce">
                <div class="step-icon"><i class="fas fa-store"></i></div>
                <span>Scraping ecommerce pricing</span>
            </li>
            <li class="step" id="step-forecast">
                <div class="step-icon"><i class="fas fa-calculator"></i></div>
                <span>Generating sales forecast</span>
            </li>
            <li class="step" id="step-niches">
                <div class="step-icon"><i class="fas fa-bullseye"></i></div>
                <span>Identifying market niches</span>
            </li>
            <li class="step" id="step-save">
                <div class="step-icon"><i class="fas fa-database"></i></div>
                <span>Saving to your account</span>
            </li>
        </ul>

        <p class="status-text" id="statusText">This usually takes 8–15 seconds…</p>

        <div class="error-box" id="errorBox"></div>
        <button class="retry-btn" id="retryBtn" onclick="startAnalysis()">
            <i class="fas fa-redo"></i> Try Again
        </button>

    </div>

    <script>
        // ── Particles setup ───────────────────────────────────────────
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 60 + 20;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%;
                animation-duration:${Math.random()*12+8}s;
                animation-delay:${Math.random()*8}s;
            `;
            container.appendChild(p);
        }

        // ── Step animation helpers ────────────────────────────────────
        const STEPS = ['step-ai','step-market','step-competitors','step-ecommerce','step-forecast','step-niches','step-save'];
        const PROGRESS_PER_STEP = 90 / STEPS.length;

        let currentProgress = 5;

        function setStepActive(id) {
            document.getElementById(id).classList.add('active');
        }
        function setStepDone(id) {
            const el = document.getElementById(id);
            el.classList.remove('active');
            el.classList.add('done');
        }
        function setProgress(pct) {
            document.getElementById('progressFill').style.width = pct + '%';
        }

        // Animate through steps visually while the fetch runs
        let stepIdx = 0;
        let stepTimer;

        function animateSteps() {
            if (stepIdx >= STEPS.length) return;
            if (stepIdx > 0) setStepDone(STEPS[stepIdx - 1]);
            setStepActive(STEPS[stepIdx]);
            currentProgress = 5 + (stepIdx + 1) * PROGRESS_PER_STEP;
            setProgress(currentProgress);
            stepIdx++;
            // Each step ~1.8s visual delay (pipeline actually runs in parallel)
            stepTimer = setTimeout(animateSteps, 1800);
        }

        // ── Main fetch ────────────────────────────────────────────────
        async function startAnalysis() {
            // Reset UI
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            STEPS.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('active', 'done');
            });
            stepIdx = 0;
            currentProgress = 5;
            setProgress(currentProgress);
            document.getElementById('statusText').textContent = 'This usually takes 8–15 seconds…';

            animateSteps();

            try {
                const res = await fetch('/analyze/run', {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({ idea: {{ idea|tojson }} }),
                });

                clearTimeout(stepTimer);

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: 'Server error' }));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }

                const data = await res.json();

                if (!data.success || !data.research_id) {
                    throw new Error(data.error || 'Analysis failed');
                }

                // All done — finish animations then redirect
                STEPS.forEach(id => setStepDone(id));
                setProgress(100);
                document.getElementById('statusText').textContent = 'Analysis complete! Redirecting…';

                setTimeout(() => {
                    window.location.href = `/history/${data.research_id}`;
                }, 600);

            } catch (err) {
                clearTimeout(stepTimer);
                STEPS.forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('active');
                });
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('errorBox').textContent = 'Something went wrong: ' + err.message;
                document.getElementById('retryBtn').style.display = 'inline-block';
                document.getElementById('statusText').textContent = 'Analysis failed.';
            }
        }

        // Auto-start on page load
        window.addEventListener('load', startAnalysis);
    </script>

</body>
</html>
