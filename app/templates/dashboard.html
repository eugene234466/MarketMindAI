{% block extra_scripts %}
<script>
    const resultsData = {{ results | tojson | safe }};

    // ── TRENDS CHART ─────────────────────────────────────────
    const td = resultsData.market_data.trends;
    if (td && td.dates && td.dates.length > 0) {
        Plotly.newPlot("trendsChart", [{
            x        : td.dates,
            y        : td.values,
            type     : "scatter",
            mode     : "lines+markers",
            line     : { color: "#00e5ff", width: 3, shape: "spline" },
            fill     : "tozeroy",
            fillcolor: "rgba(0,229,255,0.08)",
            marker   : { color: "#00e5ff", size: 4 }
        }], {
            paper_bgcolor: "transparent",
            plot_bgcolor : "transparent",
            font  : { color: "#ffffff", family: "Inter" },
            xaxis : { gridcolor: "rgba(255,255,255,0.07)", zeroline: false },
            yaxis : { gridcolor: "rgba(255,255,255,0.07)", zeroline: false },
            margin: { t: 15, b: 40, l: 40, r: 15 },
            hoverlabel: { bgcolor: "#0d1f38", bordercolor: "#00e5ff" }
        }, { responsive: true, displayModeBar: false });
    } else {
        document.getElementById("trendsChart").innerHTML =
            "<div class='empty-section'><i class='fas fa-chart-line fa-2x mb-3' style='color:rgba(0,229,255,0.3)'></i><p>No trend data available for this keyword</p></div>";
    }

    // ── SALES CHART ──────────────────────────────────────────
    const sf = resultsData.sales_forecast;
    if (sf && sf.months && sf.months.length > 0) {
        Plotly.newPlot("salesChart", [
            {
                x: sf.months, y: sf.revenue, type: "bar", name: "Revenue",
                marker: { color: "rgba(0,229,255,0.65)", line: { color: "#00e5ff", width: 1 } }
            },
            {
                x: sf.months, y: sf.trend, type: "scatter", mode: "lines", name: "Trend",
                line: { color: "#00ff64", width: 2, dash: "dot" }
            }
        ], {
            paper_bgcolor: "transparent",
            plot_bgcolor : "transparent",
            font  : { color: "#ffffff", family: "Inter" },
            xaxis : { gridcolor: "rgba(255,255,255,0.07)" },
            yaxis : { gridcolor: "rgba(255,255,255,0.07)", tickprefix: "$" },
            legend: { font: { color: "#ffffff" }, bgcolor: "transparent" },
            margin: { t: 15, b: 40, l: 60, r: 15 },
            hoverlabel: { bgcolor: "#0d1f38", bordercolor: "#00e5ff" }
        }, { responsive: true, displayModeBar: false });
    } else {
        document.getElementById("salesChart").innerHTML =
            "<div class='empty-section'><i class='fas fa-dollar-sign fa-2x mb-3' style='color:rgba(0,229,255,0.3)'></i><p>No forecast data available</p></div>";
    }

    // ── ANIMATE NICHE BARS ───────────────────────────────────
    setTimeout(() => {
        document.querySelectorAll(".niche-bar-fill").forEach(bar => {
            const width = bar.style.width;
            bar.style.width = "0%";
            setTimeout(() => { bar.style.width = width; }, 100);
        });
    }, 300);

    // ── DOWNLOAD PDF ─────────────────────────────────────────
    function downloadPDF() {
        const btn1 = document.getElementById("pdfBtn");
        const btn2 = document.getElementById("pdfBtn2");
        [btn1, btn2].forEach(b => { if (b) { b.innerHTML = "⏳ Generating..."; b.disabled = true; } });
        
        // Check if we have a direct PDF path from database
        {% if results and results.get('pdf_path') %}
            const pdfPath = "{{ results.pdf_path }}";
            window.open("/download/" + encodeURIComponent(pdfPath), "_blank");
            [btn1, btn2].forEach(b => { if (b) { b.innerHTML = "✅ Downloaded!"; b.disabled = false; } });
            setTimeout(() => {
                [btn1, btn2].forEach(b => { if (b) b.innerHTML = "<i class='fas fa-file-pdf'></i> Download PDF"; });
            }, 3000);
            return;
        {% endif %}
        
        // Otherwise generate new PDF
        const payload = new URLSearchParams();
        payload.append("idea",    "{{ results.idea }}");
        payload.append("results", JSON.stringify({{ results | tojson | safe }}));
        
        fetch("/report", {
            method : "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body   : payload
        })
        .then(async response => {
            // Check if response is OK
            if (!response.ok) {
                const text = await response.text();
                console.error("Server response:", text.substring(0, 200));
                throw new Error(`Server error: ${response.status}`);
            }
            
            // Try to parse as JSON
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                console.error("Failed to parse JSON. Response was:", text.substring(0, 200));
                throw new Error("Server returned HTML instead of JSON. The endpoint might be down.");
            }
        })
        .then(data => {
            if (data.success && data.pdf_path) {
                window.open("/download/" + encodeURIComponent(data.pdf_path), "_blank");
                [btn1, btn2].forEach(b => { if (b) { b.innerHTML = "✅ Downloaded!"; b.disabled = false; } });
                setTimeout(() => {
                    [btn1, btn2].forEach(b => { if (b) b.innerHTML = "<i class='fas fa-file-pdf'></i> Download PDF"; });
                }, 3000);
            } else {
                alert("PDF failed: " + (data.error || "Unknown error"));
                [btn1, btn2].forEach(b => { if (b) { b.innerHTML = "<i class='fas fa-file-pdf'></i> Download PDF"; b.disabled = false; } });
            }
        })
        .catch(err => {
            console.error("PDF error:", err);
            alert("Error generating PDF: " + err.message);
            [btn1, btn2].forEach(b => { if (b) { b.innerHTML = "<i class='fas fa-file-pdf'></i> Download PDF"; b.disabled = false; } });
        });
    }

    // ── EMAIL REPORT ─────────────────────────────────────────
    function emailReport() {
        const email = document.getElementById("emailInput").value;
        const btn   = document.getElementById("emailBtn");
        if (!email) { 
            alert("Please enter an email address"); 
            return; 
        }
        
        // Simple email validation
        if (!email.includes('@') || !email.includes('.')) {
            alert("Please enter a valid email address");
            return;
        }
        
        btn.innerHTML = "⏳ Sending...";
        btn.disabled = true;
        
        const payload = new URLSearchParams();
        payload.append("email",   email);
        payload.append("idea",    "{{ results.idea }}");
        payload.append("results", JSON.stringify({{ results | tojson | safe }}));
        
        {% if results and results.get('pdf_path') %}
        payload.append("pdf_path", "{{ results.pdf_path }}");
        {% endif %}
        
        fetch("/email", {
            method : "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body   : payload
        })
        .then(async response => {
            // Check if response is OK
            if (!response.ok) {
                const text = await response.text();
                console.error("Server response:", text.substring(0, 200));
                throw new Error(`Server error: ${response.status}`);
            }
            
            // Try to parse as JSON
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                console.error("Failed to parse JSON. Response was:", text.substring(0, 200));
                throw new Error("Server returned HTML instead of JSON. The endpoint might be down.");
            }
        })
        .then(data => {
            if (data.success) {
                btn.innerHTML = "✅ Sent!";
                alert("Report sent to " + email);
                setTimeout(() => {
                    btn.innerHTML = "<i class='fas fa-envelope'></i> Send Report";
                    btn.disabled = false;
                }, 3000);
            } else {
                alert("Failed: " + (data.error || "Unknown error"));
                btn.innerHTML = "<i class='fas fa-envelope'></i> Send Report";
                btn.disabled = false;
            }
        })
        .catch(err => {
            console.error("Email error:", err);
            alert("Error sending email: " + err.message);
            btn.innerHTML = "<i class='fas fa-envelope'></i> Send Report";
            btn.disabled = false;
        });
    }
</script>
{% endblock %}
