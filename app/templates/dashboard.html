{% extends "base.html" %}

{% block title %}Dashboard — {{ results.idea }}{% endblock %}


{% block extra_head %}
<style>
    /* ── KPI CARDS ─────────────────────────────────────────── */
    .kpi-card {
        background    : rgba(255,255,255,0.05);
        border        : 1px solid rgba(0,229,255,0.2);
        border-radius : 15px;
        padding       : 25px;
        text-align    : center;
        transition    : all 0.3s ease;
        height        : 100%;
    }
    .kpi-card:hover {
        border-color : #00e5ff;
        transform    : translateY(-3px);
        box-shadow   : 0 10px 30px rgba(0,229,255,0.2);
    }
    .kpi-value { font-size: 2rem; font-weight: 700; color: #00e5ff; }
    .kpi-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-top: 5px; }

    /* ── SECTION CARD ──────────────────────────────────────── */
    .section-card {
        background    : rgba(255,255,255,0.03);
        border        : 1px solid rgba(0,229,255,0.15);
        border-radius : 15px;
        padding       : 30px;
        margin-bottom : 25px;
    }
    .section-title {
        color         : #00e5ff;
        font-weight   : 700;
        font-size     : 1.1rem;
        margin-bottom : 20px;
        padding-bottom: 12px;
        border-bottom : 1px solid rgba(0,229,255,0.2);
        display       : flex;
        align-items   : center;
        gap           : 10px;
    }

    /* ── VERDICT BANNER ────────────────────────────────────── */
    .verdict-banner {
        border-radius : 20px;
        padding       : 35px;
        text-align    : center;
        margin-bottom : 25px;
        position      : relative;
        overflow      : hidden;
    }
    .verdict-banner.go {
        background : linear-gradient(135deg, rgba(0,200,100,0.15), rgba(0,229,255,0.1));
        border     : 2px solid rgba(0,200,100,0.5);
    }
    .verdict-banner.nogo {
        background : linear-gradient(135deg, rgba(255,50,50,0.15), rgba(255,100,50,0.1));
        border     : 2px solid rgba(255,50,50,0.5);
    }
    .verdict-badge {
        display       : inline-flex;
        align-items   : center;
        gap           : 12px;
        font-size     : 2rem;
        font-weight   : 800;
        padding       : 15px 40px;
        border-radius : 50px;
        margin-bottom : 15px;
    }
    .verdict-badge.go   { background: rgba(0,200,100,0.2);  color: #00ff64; border: 2px solid #00ff64; }
    .verdict-badge.nogo { background: rgba(255,50,50,0.2);  color: #ff4444; border: 2px solid #ff4444; }
    .verdict-reason     { color: rgba(255,255,255,0.7); font-size: 1.1rem; max-width: 600px; margin: 0 auto; line-height: 1.7; }

    /* ── SUMMARY CARD ──────────────────────────────────────── */
    .summary-text {
        font-size   : 1rem;
        line-height : 1.8;
        color       : rgba(255,255,255,0.75);
        border-left : 3px solid #00e5ff;
        padding-left: 20px;
        margin-bottom: 20px;
    }

    /* ── RECOMMENDATIONS ───────────────────────────────────── */
    .rec-item {
        display       : flex;
        align-items   : flex-start;
        gap           : 15px;
        padding       : 14px;
        border-radius : 10px;
        margin-bottom : 10px;
        background    : rgba(0,229,255,0.04);
        border        : 1px solid rgba(0,229,255,0.1);
        transition    : all 0.3s;
    }
    .rec-item:hover { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.25); }
    .rec-number {
        background    : #00e5ff;
        color         : #0a1628;
        font-weight   : 800;
        font-size     : 0.85rem;
        width         : 28px;
        height        : 28px;
        border-radius : 50%;
        display       : flex;
        align-items   : center;
        justify-content: center;
        flex-shrink   : 0;
    }
    .rec-text { color: rgba(255,255,255,0.8); font-size: 0.95rem; line-height: 1.5; }

    /* ── RISKS ─────────────────────────────────────────────── */
    .risk-item {
        display       : flex;
        align-items   : flex-start;
        gap           : 12px;
        padding       : 12px;
        border-radius : 10px;
        margin-bottom : 8px;
        background    : rgba(255,50,50,0.05);
        border        : 1px solid rgba(255,50,50,0.15);
    }
    .risk-icon { color: #ff6b6b; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
    .risk-text { color: rgba(255,255,255,0.7); font-size: 0.9rem; }

    /* ── COMPETITORS ───────────────────────────────────────── */
    .competitor-table { background: transparent; color: #ffffff; }
    .competitor-table th { color: #00e5ff; border-color: rgba(0,229,255,0.2); font-size: 0.85rem; }
    .competitor-table td { border-color: rgba(255,255,255,0.05); vertical-align: middle; font-size: 0.9rem; }

    /* ── NICHE BAR ─────────────────────────────────────────── */
    .niche-bar      { background: rgba(255,255,255,0.08); border-radius: 50px; height: 8px; margin: 6px 0; }
    .niche-bar-fill { background: linear-gradient(90deg, #00e5ff, #00ff64); border-radius: 50px; height: 8px; transition: width 1.2s ease; }
    .niche-card {
        background    : rgba(255,255,255,0.03);
        border        : 1px solid rgba(0,229,255,0.12);
        border-radius : 12px;
        padding       : 18px;
        margin-bottom : 12px;
        transition    : all 0.3s;
    }
    .niche-card:hover { border-color: rgba(0,229,255,0.3); }

    /* ── PRICING ───────────────────────────────────────────── */
    .pricing-card {
        background    : rgba(255,255,255,0.04);
        border        : 1px solid rgba(0,229,255,0.15);
        border-radius : 15px;
        padding       : 25px;
        text-align    : center;
        height        : 100%;
        transition    : all 0.3s;
    }
    .pricing-card:hover { border-color: #00e5ff; transform: translateY(-3px); }
    .pricing-tier  { color: rgba(255,255,255,0.5); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .pricing-value { color: #00e5ff; font-size: 1.5rem; font-weight: 700; }

    /* ── BUTTONS ───────────────────────────────────────────── */
    .btn-download {
        background    : #00e5ff; color: #0a1628; font-weight: 700;
        padding       : 13px 30px; border-radius: 50px; border: none;
        cursor        : pointer; transition: all 0.3s; font-size: 0.95rem;
    }
    .btn-download:hover { background: #ffffff; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,229,255,0.3); }
    .btn-email {
        background    : transparent; color: #00e5ff; font-weight: 700;
        padding       : 13px 30px; border-radius: 50px; border: 2px solid #00e5ff;
        cursor        : pointer; transition: all 0.3s; font-size: 0.95rem;
    }
    .btn-email:hover { background: rgba(0,229,255,0.1); transform: translateY(-2px); }
    .email-input {
        background    : rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.3);
        border-radius : 50px; color: #ffffff; padding: 12px 20px; font-size: 0.9rem;
        outline       : none; transition: all 0.3s; width: 100%;
    }
    .email-input:focus       { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0,229,255,0.2); }
    .email-input::placeholder{ color: rgba(255,255,255,0.3); }

    /* ── EMPTY STATE ───────────────────────────────────────── */
    .empty-section { text-align: center; padding: 30px; color: rgba(255,255,255,0.25); }

    /* ── CACHE BADGE ───────────────────────────────────────── */
    .cache-badge {
        background    : rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
        border-radius : 50px; color: #00e5ff; font-size: 0.75rem;
        padding       : 3px 12px; margin-left: 10px;
    }

    /* ── TARGET MARKET TAG ─────────────────────────────────── */
    .target-tag {
        display       : inline-block;
        background    : rgba(0,229,255,0.1);
        border        : 1px solid rgba(0,229,255,0.2);
        border-radius : 50px;
        color         : #00e5ff;
        font-size     : 0.82rem;
        padding       : 4px 15px;
        margin-top    : 12px;
    }

    /* ── CHART CONTAINERS ──────────────────────────────────── */
    .chart-container {
        min-height: 350px;
        width: 100%;
        position: relative;
    }
    #trendsChart, #salesChart {
        min-height: 350px;
        width: 100%;
    }
</style>
{% endblock %}
