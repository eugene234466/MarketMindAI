<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysing — MarketMind AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a1628;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.08);
            animation: float linear infinite;
        }
        @keyframes float {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 560px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 60px rgba(0,229,255,0.05);
        }

        .logo-ring {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(0,229,255,0.15);
            border-top-color: #00e5ff;
            animation: spin 1.2s linear infinite;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px;
            position: relative;
        }
        .logo-ring::after {
            content: '';
            position: absolute;
            width: 78px; height: 78px;
            border-radius: 50%;
            border: 3px solid rgba(0,229,255,0.08);
            border-bottom-color: rgba(0,229,255,0.5);
            animation: spin 2s linear infinite reverse;
        }
        .logo-ring i { font-size: 32px; color: #00e5ff; animation: pulse 1.5s ease-in-out infinite; }

        @keyframes spin  { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

        h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .idea-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 36px; }
        .idea-label span { color: #00e5ff; font-weight: 600; }

        .progress-track {
            background: rgba(255,255,255,0.06);
            border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 36px;
        }
        .progress-fill {
            height: 100%; border-radius: 999px;
            background: linear-gradient(90deg, #00e5ff, #00b8cc);
            width: 5%; transition: width 0.6s ease;
            box-shadow: 0 0 12px rgba(0,229,255,0.6);
        }

        .steps { list-style: none; text-align: left; display: flex; flex-direction: column; gap: 14px; }
        .step {
            display: flex; align-items: center; gap: 14px;
            font-size: 14px; color: rgba(255,255,255,0.4); transition: color 0.4s;
        }
        .step.active { color: #fff; }
        .step.done   { color: rgba(255,255,255,0.6); }

        .step-icon {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; flex-shrink: 0; transition: all 0.4s;
            color: rgba(255,255,255,0.25);
        }
        .step.active .step-icon {
            border-color: #00e5ff; color: #00e5ff;
            box-shadow: 0 0 12px rgba(0,229,255,0.3);
            animation: pulse 1.2s ease-in-out infinite;
        }
        .step.done .step-icon {
            background: rgba(0,200,100,0.15); border-color: #00c864; color: #00c864; animation: none;
        }

        .status-text { margin-top: 32px; font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }

        .error-box {
            display: none;
            background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3);
            border-radius: 12px; padding: 16px 20px; margin-top: 24px;
            font-size: 14px; color: #ff8888;
        }
        .retry-btn {
            display: none; margin-top: 16px;
            background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
            color: #00e5ff; padding: 10px 28px; border-radius: 999px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .retry-btn:hover { background: rgba(0,229,255,0.2); }
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="card">
    <div class="logo-ring"><i class="fas fa-brain"></i></div>
    <h1>Analysing Your Idea</h1>
    <p class="idea-label">"<span>{{ idea }}</span>"</p>

    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <ul class="steps" id="stepsList">
        <li class="step" id="step-ai">
            <div class="step-icon"><i class="fas fa-robot"></i></div>
            <span>Running Groq AI analysis</span>
        </li>
        <li class="step" id="step-market">
            <div class="step-icon"><i class="fas fa-chart-line"></i></div>
            <span>Fetching Groq Trends data</span>
        </li>
        <li class="step" id="step-competitors">
            <div class="step-icon"><i class="fas fa-crosshairs"></i></div>
            <span>Scanning competitor landscape</span>
        </li>
        <li class="step" id="step-ecommerce">
            <div class="step-icon"><i class="fas fa-store"></i></div>
            <span>Scraping ecommerce pricing</span>
        </li>
        <li class="step" id="step-forecast">
            <div class="step-icon"><i class="fas fa-calculator"></i></div>
            <span>Generating sales forecast</span>
        </li>
        <li class="step" id="step-niches">
            <div class="step-icon"><i class="fas fa-bullseye"></i></div>
            <span>Identifying market niches</span>
        </li>
        <li class="step" id="step-save">
            <div class="step-icon"><i class="fas fa-database"></i></div>
            <span>Saving to your account</span>
        </li>
    </ul>

    <p class="status-text" id="statusText">Starting analysis…</p>
    <div class="error-box" id="errorBox"></div>
    <button class="retry-btn" id="retryBtn" onclick="start()">
        <i class="fas fa-redo"></i> Try Again
    </button>
</div>

<script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 60 + 20;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;`;
        container.appendChild(p);
    }

    const STEPS = ['step-ai','step-market','step-competitors','step-ecommerce','step-forecast','step-niches','step-save'];
    let stepIdx = 0, stepTimer, pollTimer, pollCount = 0;
    const MAX_POLLS = 120; // 6 minutes max (120 × 3s)

    function setActive(id) { document.getElementById(id).classList.add('active'); }
    function setDone(id)   { const e = document.getElementById(id); e.classList.remove('active'); e.classList.add('done'); }
    function setProgress(p){ document.getElementById('progressFill').style.width = p + '%'; }

    function animateSteps() {
        if (stepIdx >= STEPS.length - 1) return; // hold at last step until really done
        if (stepIdx > 0) setDone(STEPS[stepIdx - 1]);
        setActive(STEPS[stepIdx]);
        setProgress(5 + (stepIdx + 1) * (85 / STEPS.length));
        stepIdx++;
        stepTimer = setTimeout(animateSteps, 2200);
    }

    function showError(msg) {
        clearTimeout(stepTimer);
        clearInterval(pollTimer);
        STEPS.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('errorBox').style.display = 'block';
        document.getElementById('errorBox').textContent   = 'Something went wrong: ' + msg;
        document.getElementById('retryBtn').style.display = 'inline-block';
        document.getElementById('statusText').textContent  = 'Analysis failed.';
    }

    function finish(research_id) {
        clearTimeout(stepTimer);
        clearInterval(pollTimer);
        STEPS.forEach(id => setDone(id));
        setProgress(100);
        document.getElementById('statusText').textContent = 'Analysis complete! Redirecting…';
        setTimeout(() => { window.location.href = '/history/' + research_id; }, 500);
    }

    async function poll(job_id) {
        pollCount++;
        if (pollCount > MAX_POLLS) {
            clearInterval(pollTimer);
            showError('Analysis is taking too long — please try again');
            return;
        }
        try {
            const res  = await fetch('/analyze/status/' + job_id);
            const data = await res.json();

            if (data.status === 'done') {
                // Ensure all visual steps complete before redirect
                while (stepIdx < STEPS.length) {
                    if (stepIdx > 0) setDone(STEPS[stepIdx - 1]);
                    setActive(STEPS[stepIdx]);
                    stepIdx++;
                }
                setTimeout(() => finish(data.research_id), 400);

            } else if (data.status === 'error') {
                showError(data.error || 'Unknown error');
            }
            // else 'pending' — keep polling
        } catch (e) {
            showError(e.message);
        }
    }

    async function start() {
        // Reset UI
        document.getElementById('errorBox').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'none';
        STEPS.forEach(id => { const e = document.getElementById(id); e.classList.remove('active','done'); });
        stepIdx = 0;
        setProgress(5);
        document.getElementById('statusText').textContent = 'Starting analysis…';

        // Step 1: kick off the job (returns in <1s with a job_id)
        let job_id;
        try {
            const res  = await fetch('/analyze/run', {
                method : 'POST',
                headers: {'Content-Type': 'application/json'},
                body   : JSON.stringify({ idea: {{ idea|tojson }} })
            });
            let data = {};
            try { data = await res.json(); } catch (_) {}
            if (!res.ok) {
                throw new Error(data.error || ('Server error: HTTP ' + res.status));
            }
            if (!data.job_id) {
                throw new Error(data.error || 'No job ID returned — please try again');
            }
            job_id = data.job_id;
        } catch (e) {
            showError(e.message);
            return;
        }

        // Step 2: animate steps visually while polling in background
        animateSteps();

        // Step 3: poll every 3 seconds
        pollTimer = setInterval(() => poll(job_id), 3000);
    }

    window.addEventListener('load', start);
</script>
</body>
</html>
